# SonarQube Configuration - ACEest Fitness

sonar.projectKey=aceest-fitness
sonar.projectName=ACEest Fitness
sonar.projectVersion=1.0

# Source code
sonar.sources=.

# Exclude virtualenv, cache, and tests from source scan
sonar.exclusions=venv/**,**/__pycache__/**,test_*.py

# Test coverage (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
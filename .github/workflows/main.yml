# ──────────────────────────────────────────────────────────────────────────────
# ACEest Fitness & Gym – GitHub Actions CI/CD Pipeline
# Triggers on every push and pull_request to main / master
# Stages: Lint → Build Docker Image → Run Pytest inside container
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD Pipeline – ACEest Fitness

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: aceest-fitness
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ── Stage 1: Build & Lint ───────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style issues
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=100 --statistics

      - name: Verify application imports correctly
        run: python -c "from app import app; print('Import OK')"

  # ── Stage 2: Docker Image Assembly ─────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false          # Build only; no registry push in this assignment
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true           # Make the image available to subsequent steps

      - name: Smoke-test container starts correctly
        run: |
          docker run -d --name aceest-smoke -p 5000:5000 \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          sleep 5
          curl --fail http://localhost:5000/health || (docker logs aceest-smoke && exit 1)
          docker stop aceest-smoke && docker rm aceest-smoke

      - name: Save Docker image as artifact
        run: docker save ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} | gzip > aceest-image.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: aceest-image.tar.gz
          retention-days: 1

  # ── Stage 3: Automated Testing inside container ─────────────────────────────
  automated-testing:
    name: Automated Testing (Pytest in Docker)
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker image
        run: docker load < aceest-image.tar.gz

      - name: Run Pytest inside container
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test_app.py:/app/test_app.py:ro \
            --entrypoint python \
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -m pytest test_app.py -v --tb=short \
            --junitxml=/tmp/results.xml 2>&1

      - name: Run Pytest with coverage (host-side for report)
        run: |
          pip install -r requirements.txt
          pytest test_app.py -v --cov=app --cov-report=term-missing \
            --cov-report=xml:coverage.xml --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test-results.xml
            coverage.xml

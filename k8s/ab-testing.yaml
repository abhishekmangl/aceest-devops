apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-a
  namespace: aceest
  labels:
    app: aceest-fitness
    variant: a
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: a
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: a
    spec:
      containers:
        - name: aceest
          image: abhishekmangl/aceest-fitness:latest
          ports:
            - containerPort: 5000
          env:
            - name: APP_VARIANT
              value: "A"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-version-b
  namespace: aceest
  labels:
    app: aceest-fitness
    variant: b
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-fitness
      variant: b
  template:
    metadata:
      labels:
        app: aceest-fitness
        variant: b
    spec:
      containers:
        - name: aceest
          image: abhishekmangl/aceest-fitness:latest
          ports:
            - containerPort: 5000
          env:
            - name: APP_VARIANT
              value: "B"
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-svc-a
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    variant: a
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30085
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-svc-b
  namespace: aceest
spec:
  selector:
    app: aceest-fitness
    variant: b
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30086
  type: NodePort
